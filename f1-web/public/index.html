<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pitwall — F1 Live Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' stroke='%23e10600' stroke-width='2.2' fill='none'/><circle cx='16' cy='16' r='4.5' stroke='%23e10600' stroke-width='2' fill='none'/><line x1='16' y1='3' x2='16' y2='11.5' stroke='%23e10600' stroke-width='2.2' stroke-linecap='round'/><line x1='16' y1='20.5' x2='16' y2='29' stroke='%23e10600' stroke-width='2.2' stroke-linecap='round'/><line x1='3' y1='16' x2='11.5' y2='16' stroke='%23e10600' stroke-width='2.2' stroke-linecap='round'/><line x1='20.5' y1='16' x2='29' y2='16' stroke='%23e10600' stroke-width='2.2' stroke-linecap='round'/></svg>" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="progress-bar" id="progress-bar"></div>
  <header>
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- steering wheel -->
          <circle cx="16" cy="16" r="13" stroke="#e10600" stroke-width="2.2" fill="none"/>
          <circle cx="16" cy="16" r="4.5" stroke="#e10600" stroke-width="2" fill="none"/>
          <!-- spokes -->
          <line x1="16" y1="3"  x2="16" y2="11.5" stroke="#e10600" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="16" y1="20.5" x2="16" y2="29" stroke="#e10600" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="3"  y1="16" x2="11.5" y2="16" stroke="#e10600" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="20.5" y1="16" x2="29" y2="16" stroke="#e10600" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span class="header-title">PITWALL</span>
      </div>
      <nav>
        <button class="nav-btn active" data-view="home">Home</button>
        <button class="nav-btn" data-view="races">Schedule</button>
        <button class="nav-btn" data-view="standings">Standings</button>
        <button class="nav-btn" data-view="drivers">Drivers</button>
        <button class="nav-btn" data-view="circuits">Circuits</button>
      </nav>
      <div class="season-filter">
        <span class="season-filter-label">Season</span>
        <div class="season-pills" id="season-pills">
          <!-- built dynamically by app.js -->
        </div>
      </div>
    </div>
  </header>

  <main id="app">
    <div id="loader" class="loader hidden"><div class="spinner"></div></div>

    <!-- HOME -->
    <section id="view-home" class="view active">
      <div class="hero">
        <div class="hero-text">
          <div class="hero-f1-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 30" aria-label="Formula 1">
              <path d="M101.087,30 L101.712,30 L101.712,27.107 L101.722,27.107 L102.762,30 L103.302,30 L104.342,27.107 L104.352,27.107 L104.352,30 L104.977,30 L104.977,26.251 L104.064,26.251 L103.056,29.186 L103.045,29.186 L102.011,26.251 L101.087,26.251 Z M97.627,26.818 L98.814,26.818 L98.814,30 L99.47,30 L99.47,26.818 L100.662,26.818 L100.662,26.251 L97.627,26.251 Z M90,30 L120,0 L101.944,0 L71.944,30 Z M85.699,13.065 L49.382,13.065 C38.314,13.065 36.377,13.652 31.636,18.393 C27.202,22.826 20,30 20,30 L35.732,30 L39.486,26.247 C41.953,23.779 43.226,23.524 48.407,23.524 L75.241,23.524 Z M31.152,16.253 C27.877,19.343 20.753,26.263 16.913,30 L0,30 C0,30 13.552,16.487 21.085,9.073 C28.846,1.685 32.714,0 46.949,0 L98.764,0 L87.545,11.219 L48.001,11.219 C37.999,11.219 35.752,11.912 31.152,16.253 Z" fill="#e10600"/>
            </svg>
          </div>
          <h1 id="hero-title">2026 Formula 1<br><span class="red">World Championship</span></h1>
          <p>Live standings, race results, drivers and circuits — all in one place.</p>
        </div>
      </div>
      <div class="cards-row" id="home-cards"></div>
      <div class="last-race-section">
        <h2>Last Race Results</h2>
        <div id="last-race"></div>
      </div>
    </section>

    <!-- RACES -->
    <section id="view-races" class="view">
      <div class="section-header">
        <h2 class="section-title" id="races-title">2026 Race Schedule</h2>
      </div>
      <div id="races-grid" class="races-grid"></div>
    </section>

    <!-- STANDINGS -->
    <section id="view-standings" class="view">
      <div class="section-header">
        <h2 class="section-title" id="standings-title">2026 Standings</h2>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="drivers-tab">Drivers</button>
        <button class="tab-btn" data-tab="constructors-tab">Constructors</button>
      </div>
      <div id="drivers-tab" class="tab-content active">
        <table class="standings-table" id="driver-standings-table">
          <thead><tr><th>Pos</th><th>Driver</th><th>Team</th><th>Nationality</th><th>Points</th><th>Wins</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="constructors-tab" class="tab-content">
        <table class="standings-table" id="constructor-standings-table">
          <thead><tr><th>Pos</th><th>Constructor</th><th>Nationality</th><th>Points</th><th>Wins</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- DRIVERS -->
    <section id="view-drivers" class="view">
      <div class="section-header">
        <h2 class="section-title" id="drivers-title">2026 Drivers</h2>
      </div>
      <div id="drivers-grid" class="drivers-grid"></div>
    </section>

    <!-- CIRCUITS -->
    <section id="view-circuits" class="view">
      <div class="section-header">
        <h2 class="section-title" id="circuits-title">2026 Circuits</h2>
      </div>
      <div id="circuits-grid" class="circuits-grid"></div>
    </section>
  </main>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-box">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="circuits.js"></script>
  <script src="app.js"></script>
</body>
</html>
